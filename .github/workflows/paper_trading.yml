name: paper-trading

# Steps the paper book forward once per weekday, after the NSE close (~15:30 IST
# = 10:00 UTC; run at 11:30 UTC to let data settle). It re-downloads ^NSEI +
# macro + universe, scores the new days with the FROZEN model committed under
# Data/Processed_Data/paper_model/, marks the book to market, and commits the
# updated paper_trading.json. The push triggers the Vercel git deploy, so the
# live site's Paper Trading section advances on its own. Free (GitHub-hosted).

on:
  schedule:
    - cron: "30 11 * * 1-5"      # 11:30 UTC, Mon-Fri
  workflow_dispatch: {}          # allow manual runs

permissions:
  contents: write

concurrency:
  group: paper-trading
  cancel-in-progress: false

jobs:
  paper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps (CPU TensorFlow)
        run: |
          python -m pip install --upgrade pip
          pip install "tensorflow-cpu==2.21.0" numpy pandas scipy scikit-learn pyyaml yfinance joblib

      - name: Step the paper book
        env:
          TF_CPP_MIN_LOG_LEVEL: "2"
        run: python -m Source.Paper.run --refresh

      - name: Rebuild current predictions
        env:
          TF_CPP_MIN_LOG_LEVEL: "2"
        run: python -m Source.Insights.build

      # NSE blocks datacenter IPs, so this usually fails on GitHub runners and is
      # expected to - continue-on-error keeps the rest of the job alive. Run it
      # locally from an Indian connection to actually accumulate the archive.
      - name: Archive NSE fundamentals snapshot
        continue-on-error: true
        run: python -m Source.Ingestion.nse || echo "NSE unreachable from CI (expected)"

      - name: Trade journal + attribution
        env:
          TF_CPP_MIN_LOG_LEVEL: "2"
        run: python -m Source.Journal.run

      # audit only: monitors drift and simulates the decision layer. It never
      # trains - the quarterly backbone refit is run deliberately, not on a cron.
      - name: Adaptive audit (drift + provenance)
        env:
          TF_CPP_MIN_LOG_LEVEL: "2"
        run: python -m Source.Adaptive.run

      # always(): a failure in a later step must not discard an already computed
      # paper-book update, or the live curve silently stops advancing.
      - name: Commit the update
        if: always()
        run: |
          git config user.name "paper-bot"
          git config user.email "actions@users.noreply.github.com"
          git add frontend/public/data/paper_trading.json frontend/public/data/predictions.json frontend/public/data/adaptive.json frontend/public/data/journal.json Data/Adaptive/model_versions.json Data/Raw_Data/NSE_Fundamentals/snapshots.csv Data/Paper/state.json "Data/Raw_Data/^NSEI_daily.csv"
          if git diff --cached --quiet; then
            echo "no change today"
          else
            git commit -m "chore(paper): daily paper-trading update [skip ci]"
            git push
          fi
