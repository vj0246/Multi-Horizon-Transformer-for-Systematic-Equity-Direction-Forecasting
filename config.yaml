cross_section:
  top_frac: 0.2                 # long the top 20% of names by signal each rebalance
  bottom_frac: 0.2              # short the bottom 20%
  holding_period: 20            # non-overlapping 20-day rebalances
  batch_size: 128               # RTX 2050 exposes ~1.7GB usable; 256 OOMs
  epochs: 25
  # true  -> target_h = stock's h-day return beats the cross-sectional median
  #          that date (the canonical formulation for a ranking task)
  # false -> absolute direction targets, same as the index track (first attempt;
  #          in a bull window everything is "up", so it cannot discriminate).
  # Both formulations' results are published - no cherry-picking.
  relative_targets: true
  # Cross-sectional features: give the model information ABOUT THE UNIVERSE that a
  # per-stock feature set structurally lacks (momentum vs the universe mean,
  # per-date rank transforms, sector-relative strength). This is what a ranking
  # task actually needs. Adds 6 features on top of the 11 stationary ones.
  use_xs_features: true
  # Training objective for the panel:
  #   regression     -> predict the continuous cross-sectional EXCESS log-return
  #                     per horizon (stock's h-day return minus the universe
  #                     median). A richer gradient than a binary beat/miss label:
  #                     the model is rewarded for HOW MUCH a name out/underperforms.
  #   classification -> binary "beat the median" targets (relative_targets above).
  # Both are published. Default is classification: it empirically beat the
  # regression head on this data (see README results table).
  objective: classification
  huber_delta: 0.03             # Huber loss transition (excess returns are heavy-tailed)
  xs_features:
    - xs_ret_vs_uni       # daily return minus universe-mean return that date
    - xs_mom_vs_uni       # 10d momentum minus universe-mean momentum
    - xs_mom_rank         # cross-sectional percentile rank of momentum, centered
    - xs_ret_rank         # cross-sectional percentile rank of daily return
    - xs_vol_rank         # cross-sectional percentile rank of 20d volatility
    - sector_rel_mom      # 10d momentum minus the stock's sector-mean momentum
    # canonical cross-sectional equity factors (trailing prices only)
    - xs_mom12_1_rank     # 12-month momentum skipping the last month
    - xs_reversal_rank    # short-term (1-month) reversal
    - xs_beta_rank        # 252d beta vs the equal-weight universe
    - xs_idiovol_rank     # 60d idiosyncratic vol (residual to beta*market)
    # (market regime - VIX, overnight S&P, breadth - already reaches the panel via
    #  features.use_macro; do not list it here or the columns duplicate)

features:
  # Rolling windows used across return / volatility / volume features
  return_windows: [5, 10, 20]
  vol_windows: [5, 10, 20]
  momentum_period: 10
  volume_mean_window: 5
  ma_diff_window: 10
  # News/FinBERT sentiment fusion. OFF by default: NewsAPI only serves ~30 days of
  # history, so a real daily sentiment column cannot be backfilled over 2007-2026.
  # When a daily_sentiment.csv exists AND this flag is true, sentiment is appended
  # as an extra input feature. See Source/News/build_sentiment.py.
  use_sentiment: false
  sentiment_csv: "Data/Processed_Data/daily_sentiment.csv"
  # Macro / market-state features (Source/Features/Macro.py). These add real
  # information the ^NSEI price series lacks: India VIX, the overnight S&P move
  # (US closes ~02:00 IST, before the Indian session), USDINR, crude, plus
  # breadth from the constituent universe. Every external series is asof-backward
  # merged then shifted one row => a feature at row t uses only info from <= t-1.
  use_macro: true
  macro_features:
    - vix_chg
    - vix_z60
    - spx_ret
    - spx_ret_5
    - usdinr_ret
    - crude_ret
    - breadth_above_ma20
    - xs_dispersion
  # Model inputs are restricted to stationary/bounded signals. Raw OHLCV levels
  # (close/high/low/open/volume) are still engineered and inspected in EDA but are
  # NOT fed to the model: the scaler is fit on 2007-2019, so 2023-2026 price levels
  # sit far outside the training range and those features degenerate out-of-sample.
  feature_cols:
    - daily_ret
    - roll_mean_ret_5
    - roll_mean_ret_10
    - roll_mean_ret_20
    - roll_vol_5
    - roll_vol_10
    - roll_vol_20
    - momentum_10
    - log_volume
    - vol_roll_mean_5
    - ma_diff_10

sequence:
  lookback: 60
  horizons: 20          # predict h = 1..20 days ahead

split:
  train_frac: 0.70
  val_frac: 0.15        # test = remaining 0.15

# Architecture/optimizer selected by scripts/select_model.py on the VALIDATION set
# only (best of a 6-config grid, VAL AUC 0.5828). The test set was not consulted.
model:
  d_model: 64
  num_heads: 4
  ff_dim: 128
  num_layers: 2
  dropout: 0.4          # val-selected (was 0.1); 3k train windows need regularization
  pooling: attention    # attention (learned softmax over time) | gap (GlobalAveragePooling)

training:
  epochs: 40
  batch_size: 32
  learning_rate: 0.0003   # val-selected (was 0.0001)
  early_stopping_patience: 7
  seed: 42
  # Seed-ensemble: train n_seeds models (seed, seed+1, ...) and average their
  # predictions. GPU attention/cuDNN ops are not fully deterministic even with
  # op-determinism, so a single run's numbers wobble; averaging several seeds
  # collapses that run-to-run variance and improves generalization.
  n_seeds: 3
  # require_gpu: abort training if no GPU is visible to TensorFlow. Enforced:
  # training runs through the WSL2 CUDA venv (see CLAUDE.md / scripts/train_gpu.sh).
  # Native-Windows TF is CPU-only, so a Windows-side run will now fail fast rather
  # than silently use the CPU. See Source/device.py.
  require_gpu: true

backtest:
  primary_horizon: 20           # horizon used for the alpha-signal strategy
  periods_per_year: 252
  holding_period: 20            # non-overlapping 20-day returns

  # Cost model: "india" uses the itemized Indian statutory cost stack
  # (Source/Backtest/costs.py); "flat" uses transaction_cost_bps + slippage_bps.
  cost_model: india
  india:
    instrument: futures         # futures (allows short) | delivery (long-only ETF)
    brokerage_bps: 0.3          # discount-broker equivalent, per side
    slippage_bps: 3.0           # bid-ask + impact, per side
    exchange_txn_bps: 0.19      # NSE transaction charge, per side
    sebi_bps: 0.01              # SEBI turnover fee, per side
    gst_pct: 18.0               # GST on brokerage + exchange charges
    # STT and stamp duty are instrument-dependent (see costs.INSTRUMENTS)

  # Legacy flat model (used only when cost_model: flat)
  transaction_cost_bps: 5       # commission/fees per side, in basis points
  slippage_bps: 2               # execution slippage per side, bps
  quantile_upper: 70            # long above this percentile of the signal
  quantile_lower: 30            # short below this percentile
  walk_forward:
    n_folds: 8
    min_train_frac: 0.40        # first fold trains on at least this fraction

# Volatility-targeted position sizing (Source/Risk/sizing.py). Produces a
# risk_targeted strategy variant that scales the primary timing book to a
# constant annualized-vol budget. Sizing uses lagged trailing vol (no look-ahead).
risk:
  target_vol_annual: 0.15       # 15% annualized target
  lookback: 6                   # periods of trailing vol
  max_leverage: 2.0

output:
  artifacts_dir: "frontend/public/data"
  model_dir: "Data/Processed_Data"

# ---------------------------------------------------------------------------
# Adaptive retraining (Source/Adaptive/). Layered by parameter count, not just
# by clock: the number of parameters a layer updates must be supportable by the
# number of INDEPENDENT observations that arrive in its cadence. At h=20 a week
# of daily data carries ~0.25 independent observations, so gradient-updating the
# ~70k-parameter backbone weekly would fit noise. Fast layers therefore touch
# few or zero fitted parameters; only the slow layer refits the network.
adaptive:
  # --- fast layer: monitor only, changes no parameters ---
  drift:
    enabled: true
    detectors: [adwin, page_hinkley]
    adwin_delta: 0.002          # ADWIN confidence; smaller = fewer false alarms
    ph_delta: 0.005             # Page-Hinkley slack (allowed drift before counting)
    ph_lambda: 80.0             # PH alarm threshold, in standardised units;
                                # smallest value with 0 false alarms on stationary
                                # N(0,1) and 40/40 detection of a 3-sigma shift
    min_samples: 60             # never alarm before this many observations

  # --- mid layer: decision-layer only (~40 params), trailing window ---
  recalibration:
    enabled: true
    every_days: 21              # ~monthly
    window_days: 250            # trailing window the Platt fit uses (~12 indep obs)
    min_window: 120             # refuse to recalibrate on less than this

  # --- slow layer: full backbone refit ---
  retrain:
    enabled: true
    every_days: 63              # ~quarterly
    embargo_days: 20            # gap after train cutoff; must be >= max horizon
    eval_days: 126              # held-out block the champion/challenger duel uses
    min_improvement: 0.01       # floor on the AUC gain; the real bar is z x SE
    promote_z: 1.96             # gain must also exceed this many standard errors
    min_effective_n: 30         # refuse to judge on fewer independent observations
    promote_requires_dsr: true  # ...and survive the deflated-Sharpe trial count

# Optional LLM commentary (Source/Advisor/). OFF by default and never required:
# without an API key the journal writes deterministic template text instead, so
# CI needs no secret and the site is never blocked on a paid service.
# The layer is an EXPLAINER, not an advisor - build_journal filters the payload
# so the model is never shown a forward prediction and structurally cannot emit
# a trade call.
advisor:
  provider: groq              # groq | anthropic
  model: null                 # null = provider default
