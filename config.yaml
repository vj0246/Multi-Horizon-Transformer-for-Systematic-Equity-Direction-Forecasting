# =====================================================
# Multi-Horizon Transformer - Central Configuration
# All hyperparameters previously hardcoded in the notebook now live here.
# =====================================================

data:
  ticker: "^NSEI"
  raw_csv: "Data/Raw_Data/^NSEI_daily.csv"
  start_date: "2006-01-01"

# Cross-sectional track: a panel of liquid NSE large caps. The single-index
# track showed daily index direction carries no edge after costs; ranking many
# stocks against each other on the SAME date is where a direction model can
# genuinely earn a spread. HONEST CAVEAT: this list is (mostly) today's large
# caps backtested into the past -> survivorship bias inflates absolute returns;
# the long-short spread is less affected but still favored. Disclosed on site.
universe:
  raw_dir: "Data/Raw_Data/Universe"
  min_history_days: 3000        # ~12y; drop tickers with shorter history
  window_stride: 3              # sample every 3rd day per stock (runtime control)
  # Expanded liquid NSE large/mid-cap universe. Only PRICE data (yfinance) is used
  # - point-in-time fundamentals are not fetched (using current fundamentals as
  # historical features would be look-ahead leakage). Names without enough history
  # are dropped by min_history_days.
